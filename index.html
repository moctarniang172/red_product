<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    
    <!-- Permet à la page d'être responsive sur mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Connexion</title>

    <!-- Import de Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-[linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.6)),url('images/image-contact.png')]">
    
    <div class="w-[384px] max-w-md px-4 h-[597.5896606445312px]">

        <!-- TITRE -->
        <div class="text-center text-white mb-6 flex items-center justify-center gap-4">
            <img src="images/Link → SVG.png" alt="image"> 
            <h1 class="text-2xl font-bold">RED PRODUCT</h1>
        </div>

        <!-- CARD LOGIN -->
        <div class="bg-white p-6 rounded-lg shadow-lg h-[50vh] ">

            <p class="text-gray-600 mb-4 text-sm text-center">Connectez-vous en tant que Admin</p>

            <!-- FORMULAIRE -->
            <form>
                <div class="mb-4 h-[8vh]">
            <input type="email" placeholder="E-mail" class="w-full border-b-2 border-gray-300 focus:border-gray-700 outline-none py-2">
                   
                </div>
                  <div class="mb-4 h-[8vh]">
                    <input  type="password" placeholder="Mot de passe" class="w-full border-b-2 border-gray-300 focus:border-gray-700 outline-none py-2" >
                </div>

                
                <div class="flex items-center mb-4 h-[8vh]">
                    <input type="checkbox" class="mr-2">
                    <label class="text-sm text-gray-600">
                        Gardez-moi connecté
                    </label>
                </div>

                <!-- BOUTON -->
                <button type="submit" class="w-full bg-[#474a4d] text-white py-2 rounded hover:bg-gray-900 transition"><a href="ajouter_produits.html">
                    Se connecter</a>
                </button>

            </form>
        </div>


        <div class="text-center mt-4 text-sm">
            <a href="oblier.html" class="text-yellow-500 cursor-pointer">
                Mot de passe oublié?
            </a>

            <p class="text-gray-300 mt-2">
                Vous n'avez pas de compte?
                <span class="text-yellow-500 cursor-pointer"><a href="inscription.html">S'inscrire</a></span>
            </p>
        </div>

    </div>

</body>
</html>
