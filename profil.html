<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 z-50 flex flex-col items-end"></div>

    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">

        <!-- Photo profil -->
        <div class="flex flex-col items-center mb-6">
            <div class="relative">
                <img id="photo-profil" src="https://via.placeholder.com/100" 
                     class="w-24 h-24 rounded-full object-cover border-4 border-blue-500" />
                <label for="images" 
                       class="absolute bottom-0 right-0 bg-blue-500 text-white rounded-full p-1 cursor-pointer text-xs">
                    ✏️
                </label>
                <input type="file" id="images" accept="image/*" class="hidden" />
            </div>
            <h2 id="nom-affiche" class="mt-3 text-xl font-bold text-gray-800"></h2>
            <p id="email-affiche" class="text-gray-500 text-sm"></p>
        </div>

        <!-- Formulaire modification -->
        <form id="form-profil" class="flex flex-col gap-4">
            <div>
                <label class="text-sm text-gray-600 font-medium">Nom</label>
                <input type="text" id="nom" 
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
            <div>
                <label class="text-sm text-gray-600 font-medium">Email</label>
                <input type="email" id="email" 
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
            <button type="submit" 
                    class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">
                Enregistrer les modifications
            </button>
        </form>

    </div>

    <script src="./blog-api/api.js"></script>
    <script src="./blog-api/profil.js"></script>
</body>
</html>
