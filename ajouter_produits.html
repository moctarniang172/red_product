<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>

    <title>Document</title>
</head>
<body>

    <!-- Overlay / fond sombre -->
<form action="">
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">

  <!-- Carte du formulaire -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6">

    <!-- En-tête -->
    <div class="flex items-center gap-2 mb-6">
      <button class="text-gray-400 hover:text-gray-600 transition">←</button>
      <h2 class="text-xs font-semibold tracking-widest uppercase text-gray-700">
        Créer un nouveau hôtel
      </h2>
    </div>

    <!-- Ligne 1 : Nom + Adresse -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Nom de l'hôtel</label>
        <input type="text" placeholder="CAP Marinane"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Adresse</label>
        <input type="text" placeholder="Adresse de l'hotel"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
    </div>

    <!-- Ligne 2 : Email + Téléphone -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs text-gray-500 mb-1">E mail</label>
        <input type="email" placeholder="votre adresse e-mail"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Numéro de téléphone</label>
        <input type="tel" placeholder="telephone"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
    </div>

    <!-- Ligne 3 : Prix + Devise -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Prix par nuit</label>
        <input type="number" placeholder="25 000"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Devise</label>
        <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
          <option value="XOF">F XOF</option>
          <option value="EUR">€ EUR</option>
          <option value="USD">$ USD</option>
        </select>
      </div>
    </div>

    <!-- Zone upload photo -->
    <div class="mb-6">
      <label class="block text-xs text-gray-500 mb-1">Ajouter une photo</label>
      <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-xl h-32 cursor-pointer hover:border-indigo-300 transition">
        <!-- <svg class="w-8 h-8 text-gray-300 mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg> -->
        <span class="text-xs text-gray-400">Ajouter une photo</span>
        <input type="file" class="hidden" accept="image/*" />
      </label>
    </div>

    <!-- Bouton Enregistrer -->
    <div class="flex justify-end">
      <button class="bg-gray-900 text-white text-sm font-medium px-6 py-2 rounded-lg hover:bg-gray-700 transition">
        Enregistrer
      </button>
    </div>

  </div>
</div>
</form>
    
</body>
</html>
