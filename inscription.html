<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <!-- Permet la responsivité sur mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription Admin</title>

    <!-- Import Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-[linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.6)),url('images/image-contact.png')]">

    <!-- CONTENEUR GLOBAL -->
    <div class="w-full max-w-sm sm:max-w-md px-4">

        <!-- TITRE -->
        <div class="text-center text-white mb-6 flex items-center justify-center gap-4">
            <img src="images/Link → SVG.png" alt="image"> 

            <h1 class="text-2xl font-bold">RED PRODUCT</h1>
          
        </div>

        <!-- CARD -->
<div class="bg-white p-8 rounded-lg shadow-lg">

    <p class="text-gray-800 mb-6 text-sm font-bold">
        Inscrivez-vous en tant que Admin
    </p>

    <!-- FORMULAIRE -->
    <form>

        <!-- NOM -->
        <div class="mb-6 h-[10vh]">
            <input type="text" placeholder="Nom" class="w-full bg-transparent border-b border-gray-300 focus:border-gray-700 outline-none py-2 text-gray-700 placeholder-gray-400">
        </div>

        <!-- EMAIL -->
        <div class="mb-6 h-[10vh]">
            <input type="email" placeholder="E-mail" class="w-full bg-transparent border-b border-gray-300 focus:border-gray-700 outline-none py-2 text-gray-700 placeholder-gray-400">
        </div>

        <!-- PASSWORD -->
        <div class="mb-6 h-[10vh]">
            <input type="password"  placeholder="Mot de passe" class="w-full bg-transparent border-b border-gray-300 focus:border-gray-700 outline-none py-2 text-gray-700 placeholder-gray-400">
        </div>

        <!-- CHECKBOX -->
        <div class="flex items-center mb-6">
            <input type="checkbox" id="terms" class="w-4 h-4 mr-3 accent-gray-700 cursor-pointer">
            <label for="terms" class="text-sm text-gray-600 cursor-pointer">
                Accepter les termes et la politique
            </label>
        </div>

        <!-- BOUTON -->
        <button class="w-full bg-[#474a4d] text-white py-3 rounded font-semibold hover:bg-gray-900 transition-colors duration-200 cursor-pointer"><a href="index.html">
            S'inscrire</a>
        </button>

    </form>
</div>

        <!-- LIEN BAS -->
        <div class="text-center mt-4 text-sm">
            <p class="text-gray-300">
                Vous avez déjà un compte ?
             <span class="text-yellow-500 cursor-pointer"><a href="index.html">Se connecter</a></span>

            </p>
        </div>

    </div>

</body>
</html>
