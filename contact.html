<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="h-screen bg-cover bg-center bg-no-repeat bg-[linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.6)),url('images/image-contact.png')]">">
    <div class="mx-auto flex justify-center text-white gap-4 mt-24">
        <span class="inline-block w-[22px] h-[26px] bg-white mr-2 align-middle [clip-path:polygon(0%_0%,100%_0%,100%_100%,50%_78%,0%_100%)]"></span>
         <h1>RED PRODUCT</h1>
    </div>

    <div id="inscription" class=" mx-auto w-1/2 bg-[#f5f5f5] w-[384px] h-[55vh] mt-[4%] rounded-md">
        <form action="" id="valider">
            <div class="pt-4 text-center font-bold"><h1>Connectez-vous en tant que admin</h1></div>
            <div class="mt-9  grid grid-cols-1 items-center gap-4">
                 <div class="pl-4 w-full h-[10vh] gap-4 border-b-2 border-black-500 pb-2" >
                 <h1 class="">E-mail</h1>
                 <input type="email" value="" name="nom" id="nom" placeholder="Votre e-mail" class="w-full bg-[#f5f5f5] h-[7vh] hover:border-none outline-none ">
                </div>

                 <div class="pl-4 w-full h-[10vh] gap-4 border-b-2 border-black-500 pb-2" >
                 <h1 class="">Mot de passe</h1>
                 <input type="password" value="" name="nom" id="nom" placeholder="Votre mot de passe" class="w-full bg-[#f5f5f5] h-[7vh] hover:border-none outline-none ">
                </div>

                <div class="gap-4  flex justify-center" >
                 <input type="checkbox" value="" name="nom" id="nom" class=" cursor-pointer">
                 <h1 class="font-italic">Garder moi connecter</h1>
                </div>

                <button type="submit" class="mx-auto bg-[#474a4d] rounded-md text-white mt-[-1%] w-[304px] h-[5vh]">S'inscrire</button>
            </div>
              <p class="text-black mt-5 text-center"><a href="oblier.html">Mot se passe oublié? </a>
        </form>
    </div>
     
    <!-- bouton se connecter -->
     <div class="mx-auto flex justify-center text-white gap-4 mt-4">
        <p>Vous n'avez pas encore un compte </p>
        <span><a href="inscription.html" class="text-[#ffd964] font-bold">Sinscrire</a></span>



     </div>
    
</body>
</html>
